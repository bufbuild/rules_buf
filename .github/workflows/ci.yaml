name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions: read-all
jobs:
  checkgenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Pin Bazel to .bazelversion
        run: echo "USE_BAZEL_VERSION=$(cat .bazelversion)" >> "$GITHUB_ENV"
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
      - name: Cache bazel
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-checkgenerate-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-checkgenerate-
      - name: Lint
        run: make lint
      - name: Check generated files
        run: make checkgenerate
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Pin Bazel to .bazelversion
        run: echo "USE_BAZEL_VERSION=$(cat .bazelversion)" >> "$GITHUB_ENV"
      - name: Cache bazel
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-examples-${{ hashFiles('.bazelversion', 'examples/**/MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-examples-
      - name: Build examples
        run: |
          for dir in examples/*/; do
            echo "::group::bazel build in ${dir}"
            (cd "${dir}" && bazel build //...)
            echo "::endgroup::"
          done
