name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions: read-all
jobs:
  checkgenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Pin Bazel to .bazelversion
        run: echo "USE_BAZEL_VERSION=$(cat .bazelversion)" >> "$GITHUB_ENV"
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: stable
          check-latest: true
      - name: Cache bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-checkgenerate-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-checkgenerate-
      - name: Lint
        run: make lint
      - name: Check generated files
        run: make checkgenerate
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Pin Bazel to .bazelversion
        run: echo "USE_BAZEL_VERSION=$(cat .bazelversion)" >> "$GITHUB_ENV"
      - name: Cache bazel
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/bazelisk
            ~/.cache/bazel
          key: ${{ runner.os }}-bazel-examples-${{ hashFiles('.bazelversion', 'examples/**/MODULE.bazel.lock') }}
          restore-keys: |
            ${{ runner.os }}-bazel-examples-
      - name: Build examples
        run: |
          for dir in examples/*/; do
            echo "::group::bazel build in ${dir}"
            (cd "${dir}" && bazel build //...)
            echo "::endgroup::"
          done
      - name: Check MODULE.bazel.lock drift
        run: git diff --exit-code --stat -- '**/MODULE.bazel.lock'
